<!doctype html>

<style>
:root{--bg:#050608;--text:#f7f8fb;--muted:#a1a9b4;--line:rgba(255,255,255,.13);--toward:#7dd3fc;--across:#c4b5fd;--away:#f9a8d4}
*{box-sizing:border-box}html{width:100%;height:100%;background:var(--bg)}body{margin:0;width:100%;height:100%;min-height:100%;overflow:hidden;background:radial-gradient(circle at 15% 0%,rgba(125,211,252,.12),transparent 34%),radial-gradient(circle at 82% 15%,rgba(196,181,253,.1),transparent 35%),radial-gradient(circle at 45% 100%,rgba(249,168,212,.09),transparent 36%),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,a{font:inherit}.app{width:100%;height:100vh;height:100dvh;min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr)}.topbar{min-height:58px;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:8px 18px;border-bottom:1px solid var(--line);background:rgba(5,6,8,.78);-webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);z-index:5}.brand{min-width:0}.title{font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:750}.meta{margin-top:3px;font-size:10px;color:var(--muted)}.actions{display:flex;align-items:center;gap:6px}.btn{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);border-radius:10px;height:34px;padding:0 11px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center}.btn:hover,.btn:focus-visible{background:rgba(255,255,255,.09);outline:2px solid var(--toward);outline-offset:2px}.btn[hidden]{display:none}
.deck{position:relative;min-width:0;min-height:0;overflow:hidden;touch-action:none;padding:max(16px,env(safe-area-inset-top)) max(58px,env(safe-area-inset-right)) max(16px,env(safe-area-inset-bottom)) max(58px,env(safe-area-inset-left));display:grid;place-items:center}.card{--accent:var(--toward);position:relative;width:100%;height:100%;min-height:0;max-width:1180px;max-height:860px;border:1px solid var(--line);border-radius:28px;overflow:hidden;background:linear-gradient(145deg,rgba(255,255,255,.075),rgba(255,255,255,.018));box-shadow:0 30px 100px rgba(0,0,0,.48);display:grid;grid-template-rows:auto minmax(0,1fr) auto}.card::before{content:"";position:absolute;inset:0 0 auto;height:5px;background:var(--accent)}.card[data-orientation="Toward"]{--accent:var(--toward)}.card[data-orientation="Across"]{--accent:var(--across)}.card[data-orientation="Away"]{--accent:var(--away)}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;padding:clamp(22px,4vw,48px) clamp(22px,5vw,64px) 0}.coordinate-readout{display:grid;gap:4px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}.coordinate-readout strong{color:var(--accent);font-weight:750}.count{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}.card-body{display:flex;flex-direction:column;justify-content:center;min-height:0;overflow:auto;-webkit-overflow-scrolling:touch;padding:clamp(24px,5vw,70px) clamp(22px,7vw,90px)}.family{font-size:clamp(13px,1.6vw,18px);letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin-bottom:clamp(16px,3vh,30px)}h1{margin:0;font-size:clamp(40px,7vw,92px);line-height:.96;letter-spacing:-.055em;max-width:12ch}.landing{margin:clamp(18px,3vh,34px) 0 0;font-family:Georgia,"Times New Roman",serif;font-style:italic;font-size:clamp(22px,3.4vw,42px);line-height:1.15;color:#edfaff}.sample{margin:clamp(28px,5vh,54px) 0 0;max-width:52ch;font-size:clamp(18px,2.25vw,30px);line-height:1.42;color:#d0d6de}.reading{margin:clamp(20px,3.5vh,34px) 0 0;max-width:58ch;padding-top:clamp(16px,2.5vh,24px);border-top:1px solid var(--line);font-size:clamp(15px,1.55vw,21px);line-height:1.55;color:#b9c1cb}.reading strong{color:var(--text);font-weight:700}.reading em{color:#edfaff}.card-foot{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:0 clamp(22px,5vw,64px) clamp(20px,4vw,42px)}.resolved{font-size:10px;line-height:1.45;color:var(--muted)}.resolved strong{display:block;color:var(--text);font-size:12px}.progress{height:3px;flex:1;max-width:280px;background:rgba(255,255,255,.09);border-radius:10px;overflow:hidden}.progress i{display:block;height:100%;background:var(--accent);width:var(--p)}
.axis{position:absolute;z-index:4;border:1px solid var(--line);background:rgba(5,6,8,.68);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);color:var(--text);border-radius:12px;cursor:pointer;min-width:46px;min-height:46px;padding:7px;line-height:1.05}.axis span{display:block;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--accent);font-weight:800}.axis small{display:block;margin-top:4px;font-size:9px;color:var(--muted);white-space:nowrap}.axis:hover,.axis:focus-visible{background:rgba(255,255,255,.1);outline:2px solid var(--accent);outline-offset:2px}.axis:disabled{opacity:.25;cursor:not-allowed}.north{top:10px;left:50%;transform:translateX(-50%)}.south{bottom:10px;left:50%;transform:translateX(-50%)}.west{left:8px;top:clamp(82px,14vh,128px)}.east{right:8px;top:clamp(82px,14vh,128px)}.west small,.east small{display:none}.sr-only{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
@media(max-width:700px){.topbar{min-height:52px;padding:7px 10px}.meta{display:none}.actions .essay-link{display:none}.deck{padding:52px 8px}.card{border-radius:20px}.card-head{padding:20px 20px 0}.card-body{padding:22px 20px}.card-foot{padding:0 20px 18px}.reading{display:none}.sample{font-size:16px}.north{top:5px}.south{bottom:5px}.west{left:4px;top:58px}.east{right:4px;top:58px}.axis{min-width:42px;min-height:42px;padding:5px}.axis small{font-size:8px}.west span,.east span{font-size:8px}}
@media(max-height:650px){.reading{display:none}.sample{margin-top:18px}.card-body{padding-top:18px;padding-bottom:18px}.west,.east{top:62px}}
@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="app">
<header class="topbar"><div class="brand"><div class="title">Work-Family Cards</div><div class="meta">West / East changes Work · North / South moves Toward–Is to Away–Does</div></div><div class="actions"><a class="btn essay-link" href="card_55_work_orientation_survivor.html">Card 55</a><button class="btn" id="startBtn">First</button><button class="btn" id="fullBtn">Fullscreen</button></div></header>
<main class="deck" id="deck" aria-label="Work-family card deck">
<article class="card" id="card" data-orientation="Toward" aria-labelledby="cellName">
<div class="card-head"><div class="coordinate-readout"><span>WORK: <strong id="workValue"></strong></span><span>ORIENTATION: <strong id="orientationValue"></strong></span><span>SURVIVOR: <strong id="survivorValue"></strong></span></div><div class="count" id="counter"></div></div>
<div class="card-body"><div class="family" id="family"></div><h1 id="cellName"></h1><p class="landing" id="landing"></p><p class="sample" id="sample"></p><p class="reading" id="reading"></p></div>
<div class="card-foot"><div class="resolved" id="resolved"></div><div class="progress"><i id="progress"></i></div></div>
</article>
<button class="axis north" id="north" aria-label="Previous Orientation and Survivor position"><span>North</span><small>Previous cell</small></button>
<button class="axis west" id="west" aria-label="Previous Work family"><span>West</span><small>Previous Work</small></button>
<button class="axis east" id="east" aria-label="Next Work family"><span>East</span><small>Next Work</small></button>
<button class="axis south" id="south" aria-label="Next Orientation and Survivor position"><span>South</span><small>Next cell</small></button>
<div class="sr-only" id="announcer" aria-live="polite" aria-atomic="true"></div>
</main>
</div>
<script>
const columns=[["Toward","Is"],["Toward","With"],["Toward","Does"],["Across","Is"],["Across","With"],["Across","Does"],["Away","Is"],["Away","With"],["Away","Does"]];
const data={
"Distinction":[["Focal Mark","this","A person silently points to an otherwise unnoticed object."],["Binary Bearing","this, not that","A two-position switch rests visibly at ON while OFF remains the defining opposite."],["Boundary Act","this far","A gate is closed across an entrance and passage stops."],["Scoped Standing","within this","A map shades one region and labels the whole shaded area as a protected zone."],["Context-Bound Mark","this, here","A referee raises a red card during a match."],["Scoped Distinction","these among these","A sieve separates smaller particles from larger particles across its entire surface."],["Opposed Standing","opposed","Two positions previously treated as one are set out explicitly as opposing claims."],["Graded Contrast","more and less","A greyscale strip moves continuously from white through grey to black."],["Exclusive Cut","not admitted","In a radio-button group, selecting one option automatically excludes all the others."]],
"Expansion":[["Source Field","from here","A lamp turns on and the surrounding area becomes visible."],["Source-Carried Divergence","from here, either way","Several railway lines diverge from one terminal station."],["Branching Output","more ways open","A single plant stem forks into two active shoots."],["Alternate Passage","another way through","A footbridge provides another way across a river where the main bridge is unavailable."],["Span-Carried Reach","reachable across","An electrical cable carries power from a generator to a distant building."],["Field Distribution","available throughout","A sprinkler network activates and water becomes available across the entire field."],["Released Option","free to choose","A process that appeared mandatory presents a genuine Skip option."],["Continuity Bearing","still through","A ramp replaces a set of steps, making the rise continuously traversable."],["Edge Opening","beyond","A tunnel breaks through the far side of a mountain and opens passage beyond the former barrier."]],
"Relation":[["Direct Bearing","this bears on that","Two isolated points are joined by a single line."],["Pivoted Balance","held against","Two equal weights hold a seesaw level around its fulcrum."],["Responsive Echo","answered","A single call across a canyon returns as an echo."],["Sequential Link","then","Three numbered steps appear in fixed order: 1, then 2, then 3."],["Reciprocal Shift","each changes the other","Two dancers continuously adjust their movements to one another."],["Relational Cycle","back into itself","Objects move around a circular conveyor and return to their starting position."],["Pattern Alignment","the same arrangement","A river through a valley and a contrail across the sky are recognised as the same line-splitting-field pattern."],["Role Correspondence","this plays that role","A bird’s wing and a human arm are mapped bone-for-bone as corresponding limb structures."],["Emergent Pattern","between us, something appears","Individual birds respond locally to nearby birds, producing the coordinated movement of a flock."]],
"Correction":[["Focal Adjustment","set right","A musician turns one tuning peg until the string reaches the target pitch."],["Weighted Correction","rightly weighted","A stereo balance control is adjusted until the sound is centred between unequal speakers."],["Load Transfer","the burden moves","A jack is placed beneath a sagging beam, transferring the load into the support."],["Inversion Test","does it still hold reversed?","A proof is checked in reverse, from conclusion back to premise, and still holds."],["Dual-Bound Repair","right between both","Hot and cold water are adjusted together until the mixed water reaches the required temperature."],["Corrective Turn","turn where it fails","A driver steers a drifting car back into its lane."],["Limit Reset","a better limit","A safety threshold is found to be wrongly set and is reset to the correct limit."],["Conditioned Reversal","reverse when this holds","A lift reaches the top floor and reverses direction downward."],["Disorder Release","free of the fault","A jammed mechanism is cleared and begins running smoothly again."]],
"Integration":[["Focal Whole","one whole","Hub, spokes, and rim are assembled, and a wheel stands."],["Frame-Bound Whole","held as one","Coloured glass pieces become one image through the lead frame that fixes each piece in place."],["Joint Capacity","together, able","Two blades are joined at a pivot and become scissors capable of cutting."],["Role Array","each in its place","Elements are arranged into the periodic table, each occupying a structurally determined position."],["Span-Bound Interlock","held together across","The stones of an arch hold one another in place across the opening."],["Role Activation","in operation","A missing gear is fitted into a clock, and the hands begin moving."],["Released Equilibrium","able to remain","An uneven tripod is adjusted until the whole stands level and stable."],["Sustained Equilibrium","tension that holds","A suspension bridge remains stable through the counterbearing of deck, cables, towers, and anchors."],["Convergent Whole","many become one act","Separate assembly lines deliver different components that converge into one working machine."]],
"Rest":[["Settled Alternative","chosen","After considering several keys, a person sets one apart as the chosen key and stops searching."],["Settled Unity-Bearing","together now","Two independently developed expressions are established as one identity, with the equality relation remaining explicit."],["Path Completion","arrived","A runner crosses the finish line."],["Settled Recurrence","it returns","After repeated observations, the tide is recognised as returning in the same regular pattern."],["Condition-Bound Settlement","settled if","For every right-angled triangle, the square of the hypotenuse equals the sum of the squares of the other two sides."],["Case Settlement","settled across the cases","Once the rule is settled, every remaining case is resolved by the same completed treatment."],["Transformation Release","still itself","Pythagoras’ theorem is expressed in different languages, yet the theorem remains the same completed relation."],["Retrospective Settlement","now it makes sense","A later diagnosis makes an earlier unexplained symptom intelligible."],["Continuation Discharge","nothing further is owed","A final musical cadence resolves and the piece can end without remainder."]]
};
const workFamilies=Object.keys(data),orientationText={Toward:"toward one focus",Across:"across a field",Away:"away from what came before"},modeText={Is:"as what is",With:"in what is held together",Does:"as what is completed"};
let workIndex=0,cellIndex=0;const $=id=>document.getElementById(id),card=$("card"),announcer=$("announcer"),fullBtn=$("fullBtn");
function setDisabled(button,disabled){button.disabled=disabled;button.setAttribute("aria-disabled",String(disabled))}
function render(announce=false){const work=workFamilies[workIndex],[orientation,survivor]=columns[cellIndex],cell=data[work][cellIndex],number=workIndex*9+cellIndex+1;card.dataset.orientation=orientation;$("workValue").textContent=work;$("orientationValue").textContent=orientation;$("survivorValue").textContent=survivor;$("family").textContent=work;$("cellName").textContent=cell[0];$("landing").textContent=cell[1];$("sample").textContent=cell[2];$("reading").innerHTML=`<strong>${work}</strong> settles <strong>${orientationText[orientation]}</strong>, remains <strong>${modeText[survivor]}</strong>, and lands as <strong>${cell[0]}</strong>: <em>${cell[1]}</em>.`;$("counter").textContent=`${String(number).padStart(2,"0")} / 54`;$("resolved").innerHTML=`${work} × ${orientation} × ${survivor}<strong>→ ${cell[0]}</strong>`;$("progress").style.setProperty("--p",`${number/54*100}%`);setDisabled($("west"),workIndex===0);setDisabled($("east"),workIndex===workFamilies.length-1);setDisabled($("north"),cellIndex===0);setDisabled($("south"),cellIndex===columns.length-1);card.setAttribute("aria-label",`${work}, ${orientation}, ${survivor}: ${cell[0]}, card ${number} of 54`);if(announce)announcer.textContent=`${work}, ${orientation}, ${survivor}. ${cell[0]}. Card ${number} of 54.`}
function moveWork(delta){const next=workIndex+delta;if(next<0||next>=workFamilies.length)return;workIndex=next;render(true)}function moveCell(delta){const next=cellIndex+delta;if(next<0||next>=columns.length)return;cellIndex=next;render(true)}
$("west").onclick=()=>moveWork(-1);$("east").onclick=()=>moveWork(1);$("north").onclick=()=>moveCell(-1);$("south").onclick=()=>moveCell(1);$("startBtn").onclick=()=>{workIndex=0;cellIndex=0;render(true)};
const canFullscreen=Boolean(document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen);if(!canFullscreen)fullBtn.hidden=true;else fullBtn.onclick=async()=>{try{if(document.fullscreenElement||document.webkitFullscreenElement){const exit=document.exitFullscreen||document.webkitExitFullscreen;await exit?.call(document)}else{const enter=document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen;await enter?.call(document.documentElement)}}catch(error){fullBtn.hidden=true}};
window.addEventListener("keydown",event=>{const target=event.target;if(target instanceof HTMLInputElement||target instanceof HTMLTextAreaElement||target instanceof HTMLSelectElement||target.isContentEditable)return;const actions={ArrowLeft:()=>moveWork(-1),ArrowRight:()=>moveWork(1),ArrowUp:()=>moveCell(-1),ArrowDown:()=>moveCell(1),Home:()=>{workIndex=0;cellIndex=0;render(true)},End:()=>{workIndex=workFamilies.length-1;cellIndex=columns.length-1;render(true)}};if(actions[event.key]){event.preventDefault();actions[event.key]()}});
let pointerStart=null;$("deck").addEventListener("pointerdown",event=>{if(event.target.closest("button,a"))return;pointerStart={x:event.clientX,y:event.clientY,id:event.pointerId};$("deck").setPointerCapture?.(event.pointerId)});$("deck").addEventListener("pointerup",event=>{if(!pointerStart||pointerStart.id!==event.pointerId)return;const dx=event.clientX-pointerStart.x,dy=event.clientY-pointerStart.y;pointerStart=null;if(Math.max(Math.abs(dx),Math.abs(dy))<45)return;if(Math.abs(dx)>Math.abs(dy))moveWork(dx<0?1:-1);else moveCell(dy<0?-1:1)});$("deck").addEventListener("pointercancel",()=>pointerStart=null);
window.addEventListener("pageshow",()=>render());window.addEventListener("orientationchange",()=>setTimeout(render,50));render();
</script>
</body>
