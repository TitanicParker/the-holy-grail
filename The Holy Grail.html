ar(--text);font-size:10px}.secondary{justify-self:end;display:grid;gap:8px;text-align:right;min-width:0}.resolved{font-size:10px;line-height:1.45;color:var(--muted)}.resolved strong{display:block;color:var(--text);font-size:12px}.hint{font-size:9px;color:var(--muted)}.progress{height:3px;width:min(190px,100%);margin-left:auto;background:rgba(255,255,255,.09);border-radius:10px;overflow:hidden}.progress i{display:block;height:100%;background:var(--accent);width:var(--p)}.sr-only{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

<body>
<div class="app">
<header class="topbar"><div class="brand"><div class="title">Work-Family Cards</div><div class="meta">54 fullscreen cells · arrows change one coordinate · [ and ] change Work</div></div><div class="actions"><a class="btn essay-link" href="card_55_work_orientation_survivor.html">Card 55</a><button class="btn" id="startBtn">First</button><button class="btn" id="fullBtn">Fullscreen</button></div></header>
<main class="deck" id="deck" aria-label="Work-family card deck">

<div class="card-head"><div class="coordinate-readout" id="coordinateReadout"><span>WORK: <strong id="workValue"></strong></span><span>ORIENTATION: <strong id="orientationValue"></strong></span><span>SURVIVOR: <strong id="survivorValue"></strong></span></div><div class="count" id="counter"></div></div>

</div>
</article>

</main>
</div>
<script>
const columns=[["Toward","Is"],["Toward","With"],["Toward","Does"],["Across","Is"],["Across","With"],["Across","Does"],["Away","Is"],["Away","With"],["Away","Does"]];
const data={
"Distinction":[["Focal Mark","this","A person silently points to an otherwise unnoticed object."],["Binary Bearing","this, not that","A two-position switch rests visibly at ON while OFF remains the defining opposite."],["Boundary Act","this far","A gate is closed across an entrance and passage stops."],["Scoped Standing","within this","A map shades one region and labels the whole shaded area as a protected zone."],["Context-Bound Mark","this, here","A referee raises a red card during a match."],["Scoped Distinction","these among these","A sieve separates smaller particles from larger particles across its entire surface."],["Opposed Standing","opposed","Two positions previously treated as one are set out explicitly as opposing claims."],["Graded Contrast","more and less","A greyscale strip moves continuously from white through grey to black."],["Exclusive Cut","not admitted","In a radio-button group, selecting one option automatically excludes all the others."]],
"Expansion":[["Source Field","from here","A lamp turns on and the surrounding area becomes visible."],["Source-Carried Divergence","from here, either way","Several railway lines diverge from one terminal station."],["Branching Output","more ways open","A single plant stem forks into two active shoots."],["Alternate Passage","another way through","A footbridge provides another way across a river where the main bridge is unavailable."],["Span-Carried Reach","reachable across","An electrical cable carries power from a generator to a distant building."],["Field Distribution","available throughout","A sprinkler network activates and water becomes available across the entire field."],["Released Option","free to choose","A process that appeared mandatory presents a genuine Skip option."],["Continuity Bearing","still through","A ramp replaces a set of steps, making the rise continuously traversable."],["Edge Opening","beyond","A tunnel breaks through the far side of a mountain and opens passage beyond the former barrier."]],
"Relation":[["Direct Bearing","this bears on that","Two isolated points are joined by a single line."],["Pivoted Balance","held against","Two equal weights hold a seesaw level around its fulcrum."],["Responsive Echo","answered","A single call across a canyon returns as an echo."],["Sequential Link","then","Three numbered steps appear in fixed order: 1, then 2, then 3."],["Reciprocal Shift","each changes the other","Two dancers continuously adjust their movements to one another."],["Relational Cycle","back into itself","Objects move around a circular conveyor and return to their starting position."],["Pattern Alignment","the same arrangement","A river through a valley and a contrail across the sky are recognised as the same line-splitting-field pattern."],["Role Correspondence","this plays that role","A bird’s wing and a human arm are mapped bone-for-bone as corresponding limb structures."],["Emergent Pattern","between us, something appears","Individual birds respond locally to nearby birds, producing the coordinated movement of a flock."]],
"Correction":[["Focal Adjustment","set right","A musician turns one tuning peg until the string reaches the target pitch."],["Weighted Correction","rightly weighted","A stereo balance control is adjusted until the sound is centred between unequal speakers."],["Load Transfer","the burden moves","A jack is placed beneath a sagging beam, transferring the load into the support."],["Inversion Test","does it still hold reversed?","A proof is checked in reverse, from conclusion back to premise, and still holds."],["Dual-Bound Repair","right between both","Hot and cold water are adjusted together until the mixed water reaches the required temperature."],["Corrective Turn","turn where it fails","A driver steers a drifting car back into its lane."],["Limit Reset","a better limit","A safety threshold is found to be wrongly set and is reset to the correct limit."],["Conditioned Reversal","reverse when this holds","A lift reaches the top floor and reverses direction downward."],["Disorder Release","free of the fault","A jammed mechanism is cleared and begins running smoothly again."]],
"Integration":[["Focal Whole","one whole","Hub, spokes, and rim are assembled, and a wheel stands."],["Frame-Bound Whole","held as one","Coloured glass pieces become one image through the lead frame that fixes each piece in place."],["Joint Capacity","together, able","Two blades are joined at a pivot and become scissors capable of cutting."],["Role Array","each in its place","Elements are arranged into the periodic table, each occupying a structurally determined position."],["Span-Bound Interlock","held together across","The stones of an arch hold one another in place across the opening."],["Role Activation","in operation","A missing gear is fitted into a clock, and the hands begin moving."],["Released Equilibrium","able to remain","An uneven tripod is adjusted until the whole stands level and stable."],["Sustained Equilibrium","tension that holds","A suspension bridge remains stable through the counterbearing of deck, cables, towers, and anchors."],["Convergent Whole","many become one act","Separate assembly lines deliver different components that converge into one working machine."]],
"Rest":[["Settled Alternative","chosen","After considering several keys, a person sets one apart as the chosen key and stops searching."],["Settled Unity-Bearing","together now","Two independently developed expressions are established as one identity, with the equality relation remaining explicit."],["Path Completion","arrived","A runner crosses the finish line."],["Settled Recurrence","it returns","After repeated observations, the tide is recognised as returning in the same regular pattern."],["Condition-Bound Settlement","settled if","For every right-angled triangle, the square of the hypotenuse equals the sum of the squares of the other two sides."],["Case Settlement","settled across the cases","Once the rule is settled, every remaining case is resolved by the same completed treatment."],["Transformation Release","still itself","Pythagoras’ theorem is expressed in different languages, yet the theorem remains the same completed relation."],["Retrospective Settlement","now it makes sense","A later diagnosis makes an earlier unexplained symptom intelligible."],["Continuation Discharge","nothing further is owed","A final musical cadence resolves and the piece can end without remainder."]]
};
const workFamilies=Object.keys(data),orientations=["Toward","Across","Away"],survivors=["Is","With","Does"];
const orientationText={Toward:"toward one focus",Across:"across a field",Away:"away from what came before"};
const modeText={Is:"as what is",With:"in what is held together",Does:"as what is completed"};
let workIndex=0,orientationIndex=0,survivorIndex=0;
const $=id=>document.getElementById(id),card=$("card"),announcer=$("announcer");
const familyStrip=$("familyStrip");
workFamilies.forEach((work,i)=>{const button=document.createElement("button");button.className="family-button";button.dataset.short=work[0];button.setAttribute("aria-label",`Work family: ${work}`);button.title=work;button.addEventListener("click",()=>{workIndex=i;render(true)});familyStrip.appendChild(button)});
function activeCell(){const cellIndex=orientationIndex*3+survivorIndex;return data[workFamilies[workIndex]][cellIndex]}
function cardNumber(){return workIndex*9+orientationIndex*3+survivorIndex+1}
function setDisabled(button,disabled){button.disabled=disabled;button.setAttribute("aria-disabled",String(disabled))}
function render(announce=false){const work=workFamilies[workIndex],orientation=orientations[orientationIndex],survivor=survivors[survivorIndex],cell=activeCell(),number=cardNumber();card.dataset.orientation=orientation;$("workValue").textContent=work;$("orientationValue").textContent=orientation;$("survivorValue").textContent=survivor;$("family").textContent=work;$("cellName").textContent=cell[0];$("landing").textContent=cell[1];$("sample").textContent=cell[2];$("reading").innerHTML=`<strong>${work}</strong> settles <strong>${orientationText[orientation]}</strong>, remains <strong>${modeText[survivor]}</strong>, and lands as <strong>${cell[0]}</strong>: <em>${cell[1]}</em>.`;$("counter").textContent=`${String(number).padStart(2,"0")} / 54`;$("resolved").innerHTML=`${work} × ${orientation} × ${survivor}<strong>→ ${cell[0]}</strong>`;$("progress").style.setProperty("--p",`${number/54*100}%`);setDisabled($("west"),survivorIndex===0);setDisabled($("east"),survivorIndex===survivors.length-1);setDisabled($("north"),orientationIndex===0);setDisabled($("south"),orientationIndex===orientations.length-1);setDisabled($("prevWork"),workIndex===0);setDisabled($("nextWork"),workIndex===workFamilies.length-1);[...familyStrip.children].forEach((button,i)=>button.setAttribute("aria-current",String(i===workIndex)));card.setAttribute("aria-label",`${work}, ${orientation}, ${survivor}: ${cell[0]}, card ${number} of 54`);if(announce)announcer.textContent=`${work}, ${orientation}, ${survivor}. ${cell[0]}. Card ${number} of 54.`}
function moveSurvivor(delta){const next=survivorIndex+delta;if(next<0||next>=survivors.length)return;survivorIndex=next;render(true)}
function moveOrientation(delta){const next=orientationIndex+delta;if(next<0||next>=orientations.length)return;orientationIndex=next;render(true)}
function moveWork(delta){const next=workIndex+delta;if(next<0||next>=workFamilies.length)return;workIndex=next;render(true)}
$("west").onclick=()=>moveSurvivor(-1);$("east").onclick=()=>moveSurvivor(1);$("north").onclick=()=>moveOrientation(-1);$("south").onclick=()=>moveOrientation(1);$("prevWork").onclick=()=>moveWork(-1);$("nextWork").onclick=()=>moveWork(1);$("startBtn").onclick=()=>{workIndex=orientationIndex=survivorIndex=0;render(true)};$("fullBtn").onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.();
window.addEventListener("keydown",event=>{const target=event.target;if(target instanceof HTMLInputElement||target instanceof HTMLTextAreaElement||target instanceof HTMLSelectElement||target.isContentEditable)return;const actions={ArrowLeft:()=>moveSurvivor(-1),ArrowRight:()=>moveSurvivor(1),ArrowUp:()=>moveOrientation(-1),ArrowDown:()=>moveOrientation(1),"[":()=>moveWork(-1),"]":()=>moveWork(1),PageUp:()=>moveWork(-1),PageDown:()=>moveWork(1),Home:()=>{workIndex=orientationIndex=survivorIndex=0;render(true)},End:()=>{workIndex=workFamilies.length-1;orientationIndex=orientations.length-1;survivorIndex=survivors.length-1;render(true)}};if(actions[event.key]){event.preventDefault();actions[event.key]()}});
let pointerStart=null;$("deck").addEventListener("pointerdown",event=>{if(event.target.closest("button,a"))return;pointerStart={x:event.clientX,y:event.clientY,id:event.pointerId};$("deck").setPointerCapture?.(event.pointerId)});$("deck").addEventListener("pointerup",event=>{if(!pointerStart||pointerStart.id!==event.pointerId)return;const dx=event.clientX-pointerStart.x,dy=event.clientY-pointerStart.y;pointerStart=null;if(Math.max(Math.abs(dx),Math.abs(dy))<45)return;if(Math.abs(dx)>Math.abs(dy))moveSurvivor(dx<0?1:-1);else moveOrientation(dy<0?-1:1)});$("deck").addEventListener("pointercancel",()=>pointerStart=null);
render();
</script>
